<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggo - No es un perro, es una movida</title>
    
    <!-- Meta tags para SEO y redes sociales -->
    <meta name="description" content="Doggo - Pizzas y perros calientes con estilo urbano. Haz tu pedido por WhatsApp en segundos.">
    <meta property="og:title" content="Doggo - No es un perro, es una movida">
    <meta property="og:description" content="Pizzas y perros calientes con estilo urbano. Pedido rápido por WhatsApp.">
    <meta property="og:image" content="assets/img/doggo1.png">
    
    <!-- Precarga de recursos críticos -->
    <link rel="preload" href="assets/css/global.css" as="style">
    <link rel="preload" href="assets/js/script.js" as="script">
    
    <!-- CSS Global (siempre presente) -->
    <link rel="stylesheet" href="assets/css/global.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/doggo1.png">
</head>
<body>
    <!-- Navbar persistente -->
    <nav class="navbar" role="navigation" aria-label="Navegación principal">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="#/home" class="nav-logo">
                    <img src="assets/img/doggo1.png" alt="Doggo Logo" height="50">
                    <span class="brand-text">Doggo-app</span>
                </a>
            </div>
            
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span class="hamburger"></span>
            </button>
            
            <ul class="nav-menu">
                <li><a href="#/home" class="nav-link active">Inicio</a></li>
                <li><a href="#/pedido" class="nav-link">Haz tu Pedido</a></li>
                <li><a href="#/metodospagos" class="nav-link">Métodos de Pago</a></li>
                <li><a href="#/contacto" class="nav-link">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenido dinámico -->
    <main id="app-content">
        <!-- El contenido se inyecta aquí vía JavaScript -->
        <div class="loading-state">
            <div class="loader"></div>
            <p>Cargando Doggo...</p>
        </div>
    </main>

    <!-- Footer persistente -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <img src="assets/img/doggo1.png" alt="Doggo" height="40">
                <p>© 2026 Doggo - No es un perro, es una movida</p>
            </div>
            <div class="footer-social">
                <a href="#" aria-label="Instagram">📸</a>
                <a href="#" aria-label="WhatsApp">💬</a>
                <a href="#" aria-label="TikTok">🎵</a>
            </div>
        </div>
    </footer>

    <!-- Script principal -->
    <script src="assets/js/script.js" defer></script>
</body>
</html>
