<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doggo App</title>

    <link
      rel="icon"
      type="image/x-icon"
      href="assets/img/doggo1.png"
    />

    <!-- Bootstrap y FontAwesome solo una vez (persistente) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Estilos globales (persistentes) -->
    <link rel="stylesheet" href="assets/css/global.css" />

    <!-- CSS dinámico de la vista se insertará aquí -->
    <link id="active-view-css" rel="stylesheet" href="" />
  </head>

  <body>
    <header class="app-navbar py-3">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
          <a class="navbar-brand text-decoration-none" href="#/home">
            <img
              src="assets/img/doggo1.png"
              alt="Doggo"
              style="height: 34px; width: auto; margin-right: 10px"
            />
            <span>Doggo App</span>
          </a>

          <nav class="d-flex gap-3 flex-wrap" id="main-nav">
            <a class="nav-link active" href="#/home">Home</a>
            <a class="nav-link" href="#/pedido">Pedido</a>
            <a class="nav-link" href="#/metodospagos">Pagos</a>
            <a class="nav-link" href="#/contacto">Contacto</a>
          </nav>

          <button
            class="btn btn-ghost btn-sm d-none"
            id="nav-toggle"
            type="button"
            aria-label="Abrir menú"
            aria-controls="mobile-nav"
            aria-expanded="false"
          >
            <i class="fas fa-bars"></i>
          </button>

          <nav
            class="d-none flex-column gap-2"
            id="mobile-nav"
            aria-hidden="true"
          >
            <div class="d-flex justify-content-end mb-3">
              <button
                type="button"
                class="btn btn-ghost btn-sm"
                id="nav-close"
                aria-label="Cerrar menú"
              >
                <i class="fas fa-xmark"></i>
              </button>
            </div>

            <a class="nav-link active" href="#/home">Home</a>
            <a class="nav-link" href="#/pedido">Pedido</a>
            <a class="nav-link" href="#/metodospagos">Pagos</a>
            <a class="nav-link" href="#/contacto">Contacto</a>
          </nav>

          <script>
            // Comportamiento del menú móvil: fullscreen overlay + animación.
            (function () {
              const btn = document.getElementById('nav-toggle');
              const mobile = document.getElementById('mobile-nav');
              const closeBtn = document.getElementById('nav-close');
              if (!btn || !mobile) return;

              const open = () => {
                mobile.classList.remove('d-none');
                mobile.setAttribute('aria-hidden', 'false');
                btn.setAttribute('aria-expanded', 'true');
              };

              const close = () => {
                mobile.classList.add('d-none');
                mobile.setAttribute('aria-hidden', 'true');
                btn.setAttribute('aria-expanded', 'false');
              };

              btn.addEventListener('click', function () {
                const isHidden = mobile.classList.contains('d-none');
                if (isHidden) open();
                else close();
              });

              if (closeBtn) closeBtn.addEventListener('click', close);

              // Cerrar con ESC
              window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') close();
              });
            })();
          </script>




          <div class="d-flex align-items-center gap-2">
            <a class="btn btn-accent btn-sm" href="#/pedido">
              <i class="fas fa-shopping-cart me-1"></i>Confirmar
            </a>
          </div>
        </div>
      </div>
    </header>

    <main id="app-content" class="container py-4"></main>

    <footer class="app-footer text-white py-4">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
            <div class="small">
              <i class="far fa-copyright me-1"></i>
              <strong class="text-accent">Doggo</strong> 2026
            </div>
            <div class="small muted">Todos los derechos reservados</div>
          </div>

          <div class="col-md-4 text-center mb-3 mb-md-0">
            <span class="text-uppercase small fw-bold text-accent d-block mb-2">
              Síguenos
            </span>
            <div class="d-flex justify-content-center gap-3">
              <a
                href="https://facebook.com"
                target="_blank"
                class="text-decoration-none"
                aria-label="Facebook"
              >
                <span
                  class="d-inline-flex align-items-center justify-content-center rounded-circle"
                  style="width: 36px; height: 36px; background: rgba(255,255,255,0.12)"
                >
                  <i class="fab fa-facebook-f"></i>
                </span>
              </a>
              <a
                href="https://instagram.com"
                target="_blank"
                class="text-decoration-none"
                aria-label="Instagram"
              >
                <span
                  class="d-inline-flex align-items-center justify-content-center rounded-circle"
                  style="width: 36px; height: 36px; background: rgba(255,255,255,0.12)"
                >
                  <i class="fab fa-instagram"></i>
                </span>
              </a>
            </div>
          </div>

          <div class="col-md-4 text-center text-md-end">
            <div class="small">
              <i class="fas fa-user text-accent me-1"></i>Author: Jairo Cárdenas
            </div>
            <a class="text-accent text-decoration-none small" href="mailto:jairo.cardenas.dev@gmail.com">
              <i class="fas fa-envelope me-1"></i>
              jairo.cardenas.dev@gmail.com
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script src="assets/js/script.js"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
